name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Validate trước khi build image
  # ─────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    outputs:
      image_name_lower: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: lowercase
        run: echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

  # ─────────────────────────────────────────────
  # Job 2a: Build và push Backend image (PARALLEL)
  # ─────────────────────────────────────────────
  build-backend:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.validate.outputs.image_name_lower }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2b: Build và push Frontend image (PARALLEL)
  # ─────────────────────────────────────────────
  build-frontend:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.validate.outputs.image_name_lower }}/frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─────────────────────────────────────────────
  # Job 3: Deploy lên VPS (đợi cả 2 builds hoàn thành)
  # ─────────────────────────────────────────────
  deploy:
    needs: [validate, build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml"
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 15m
          script: |
            set -e

            # Tạo thư mục deploy nếu chưa có
            mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # ── Bước 1: Ghi .env ───────────────────────────────────
            cat > .env << 'ENVEOF'
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=24h
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            GITHUB_REPOSITORY=${{ needs.validate.outputs.image_name_lower }}
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env

            # ── Bước 2: Login GHCR ─────────────────────────────────
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # ── Bước 3: Pull images mới ────────────────────────────
            docker compose pull

            # ── Bước 4: Start database trước, chờ healthy ─────────
            docker compose up -d postgres

            echo "Waiting for PostgreSQL to be ready..."
            for i in $(seq 1 30); do
              if docker compose exec -T postgres pg_isready -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }} > /dev/null 2>&1; then
                echo "PostgreSQL is ready."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: PostgreSQL did not become ready in time."
                exit 1
              fi
              sleep 2
            done

            # ── Bước 5: Sync database schema ───────────────────────
            # CloudSchool dùng prisma db push (không có migration files)
            echo "Syncing database schema..."
            docker compose run --rm backend npx prisma db push --accept-data-loss
            echo "Schema sync completed."

            # ── Bước 5.5: Seed database (idempotent - safe to run multiple times)
            echo "Seeding database..."
            docker compose run --rm backend npm run db:seed
            echo "Seeding completed."

            # ── Bước 6: Start tất cả services ─────────────────────
            docker compose up -d --force-recreate

            # ── Bước 7: Verify backend healthy ─────────────────────
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' cloudschool-backend 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "Backend is healthy!"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "ERROR: Backend did not become healthy. Check logs:"
                docker compose logs --tail=50 backend
                exit 1
              fi
              echo "Backend status: $STATUS, retrying ($i/20)..."
              sleep 5
            done

            # ── Bước 8: Cleanup để tránh tràn bộ nhớ ──────────────
            echo "Starting cleanup..."

            docker container prune -f
            docker image prune -f

            echo "Cleaning old backend images..."
            docker images "ghcr.io/${{ needs.validate.outputs.image_name_lower }}/backend" --format "{{.ID}} {{.CreatedAt}}" | \
              sort -k2 -r | tail -n +4 | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true

            echo "Cleaning old frontend images..."
            docker images "ghcr.io/${{ needs.validate.outputs.image_name_lower }}/frontend" --format "{{.ID}} {{.CreatedAt}}" | \
              sort -k2 -r | tail -n +4 | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true

            docker builder prune -f --keep-storage 500MB 2>/dev/null || true
            docker network prune -f

            echo "Disk usage after cleanup:"
            df -h / | tail -1
            echo "Docker disk usage:"
            docker system df

            # ⚠️  KHÔNG dùng 'docker volume prune' - sẽ xóa postgres_data!

            echo "Deployment completed successfully!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to ${{ github.event.inputs.environment }} was successful!"
          else
            echo "❌ Deployment to ${{ github.event.inputs.environment }} failed!"
          fi
